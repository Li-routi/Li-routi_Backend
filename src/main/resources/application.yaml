spring:
  application:
    name: lirouti

  config:
    import: optional:file:.env[.properties]
  # 로컬 개발 기본 프로파일. 배포 시 SPRING_PROFILES_ACTIVE 환경변수로 override.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # 모든 값은 ${환경변수:기본값} 으로 주입됩니다.
  # - 기본값은 "로컬 docker 개발용 임시값" 이며, 운영 환경에서는 반드시 환경변수로 override 합니다.
  # - 운영 DB 비밀번호·JWT 시크릿 등 실제 비밀값은 절대 커밋하지 말고 환경변수(또는 시크릿 매니저)로만 주입하세요.
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lirouti?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:lirouti}
    password: ${DB_PASSWORD:lirouti1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# jwt 설정 관련
jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration-time: 300000 # 5분
  temp-token:
    expiration-time: 3600000
  refresh-token:
    expiration-time: 1209600000 # 14일
  dev-token:
    expiration-time: 1209600000
  issuer: lirouti

oauth:
  kakao:
    app-id: ${KAKAO_APP_ID}
  google:
    web-client-id: ${GOOGLE_WEB_CLIENT_ID}
    allowed-issuers: ${GOOGLE_ALLOWED_ISSUERS}

# 미디어 업로드(S3 presigned URL) 설정
# 자격증명은 여기에 두지 않는다. 운영은 EC2 인스턴스 프로필(IAM Role),
# 로컬은 AWS CLI 프로파일에서 SDK가 자동으로 가져간다.
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${AWS_S3_BUCKET}
    # 업로드용 서명 URL 유효 시간. 짧을수록 안전하다.
    presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:PT5M}
    # 카테고리별 최대 업로드 용량(바이트). 사진 기본 10MB, 영상 기본 50MB.
    # 영상은 아직 켜져 있지 않지만(영상 형식 미등록), 켜질 때 바로 쓰도록 값을 둔다.
    max-image-size: ${AWS_S3_MAX_IMAGE_SIZE:10485760}
    max-video-size: ${AWS_S3_MAX_VIDEO_SIZE:52428800}
    # 저장된 미디어를 읽을 때 사용할 공개 주소. DB에는 오브젝트 key만 저장하고 읽기 URL을 이 값 + key로
    # 조립한다. 미주입 시 버킷·리전으로 S3 주소를 계산해 기본값으로 쓴다 —
    # 그래야 설정 없이도 앱이 부팅되어 배포가 깨지지 않는다(버킷이 공개면 이미지도 그대로 동작).
    # path-style(s3.리전/버킷)을 쓴다. 가상호스팅(버킷.s3.리전)은 버킷명에 '.'이 있으면
    # 와일드카드 TLS 인증서(*.s3.리전...)와 안 맞아 조회가 깨지므로, 버킷명에 무관하게 안전한 형식을 택한다.
    # CloudFront 등을 붙이면 AWS_S3_PUBLIC_BASE_URL로 이 값을 덮어써 오리진을 바꾼다.
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL:https://s3.${AWS_REGION:ap-northeast-2}.amazonaws.com/${AWS_S3_BUCKET}}
