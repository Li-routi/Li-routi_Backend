name: Deploy to EC2

# git 태그(v*) push 시에만 실행됩니다. (예: v1.0.0)
#   git tag v1.0.0 && git push origin v1.0.0
# 필요 시 Actions 탭에서 수동 실행(workflow_dispatch)도 가능합니다.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 동시에 여러 배포가 겹치지 않도록 직렬화
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # 1단계) 테스트 + 빌드 — 여기서 컴파일/테스트/jar 생성을 한 번에 끝내고 산출물을 넘김
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    # @SpringBootTest 가 붙을 MySQL·Redis 를 CI 안에서 컨테이너로 기동
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root1234
          MYSQL_DATABASE: lirouti
          MYSQL_USER: lirouti
          MYSQL_PASSWORD: lirouti1234
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -proot1234"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # build = 컴파일 + 테스트 + bootJar 까지 한 번에 (컴파일은 여기서 딱 1회)
      - name: Test & build
        run: ./gradlew clean build
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_URL: jdbc:mysql://127.0.0.1:3306/lirouti?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
          DB_USERNAME: lirouti
          DB_PASSWORD: lirouti1234
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""

      # 빌드된 jar 를 deploy 잡으로 전달 (재컴파일 방지)
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  # 2단계) 배포 — test 통과 시에만 실행. 재빌드 없이 산출물만 EC2 로 전송
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Prepare jar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v plain | head -1)
          cp "$JAR" app.jar
          echo "배포 대상: $JAR  (tag=${GITHUB_REF_NAME})"

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          source: app.jar
          target: /home/${{ secrets.EC2_USERNAME }}/app

      - name: Restart service on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script: |
            set -e
            sudo systemctl restart lirouti
            sleep 3
            sudo systemctl --no-pager status lirouti | head -n 15
