name: Deploy to EC2

# 릴리스 태그(v*) push 시에만 배포한다. (예: git tag v1.0.0 && git push origin v1.0.0)
# 테스트는 별도 test.yml(PR·push)에서 돌리고, 여기서는 이미 테스트된 커밋을 이미지로 만들어 배포만 한다.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 실행 jar만 만든다(테스트는 test.yml 담당). plain jar는 build.gradle에서 비활성화됨.
      - name: Build jar
        run: ./gradlew bootJar --no-daemon

      # GHCR 이미지 경로는 소문자만 허용 — 레포명(Li-routi/...)을 소문자로 변환한다.
      - name: Resolve lowercase image name
        id: img
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 크로스 빌드)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # t4g(Graviton)는 ARM이므로 반드시 linux/arm64로 빌드한다. amd64 이미지는 서버에서 실행 불가.
      # 롤백 경로를 위해 latest와 커밋 sha 태그를 함께 push한다.
      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ github.sha }}

      # 서버는 새 이미지를 pull 해서 재기동만 한다(서버에서 빌드하지 않음).
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/app
            docker compose pull
            docker compose up -d
            docker image prune -f

      # 배포 결과를 Discord로 알림. DISCORD_WEBHOOK 시크릿이 없으면 조용히 건너뛴다.
      - name: Notify Discord (성공)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -sf -H "Content-Type: application/json" \
            -d "$(printf '{"content":"✅ **배포 성공** — `%s` — %s"}' "$REF" "$RUN_URL")" \
            "$DISCORD_WEBHOOK" || true

      - name: Notify Discord (실패)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -sf -H "Content-Type: application/json" \
            -d "$(printf '{"content":"❌ **배포 실패** — `%s` — %s"}' "$REF" "$RUN_URL")" \
            "$DISCORD_WEBHOOK" || true
