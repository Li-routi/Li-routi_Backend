name: Deploy to EC2

# 릴리스 태그(v*) push 시에만 배포한다. (예: git tag v1.0.0 && git push origin v1.0.0)
# 테스트는 별도 test.yml(PR·push)에서 돌리고, 여기서는 이미 테스트된 커밋을 이미지로 만들어 배포만 한다.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # workflow_dispatch는 아무 브랜치에서나 실행할 수 있다. 그대로 두면 github.ref_name이
      # 브랜치명(develop 등)이 되어 :develop 이미지가 배포되고, 서버 .env의 APP_IMAGE_TAG도
      # 브랜치명으로 고정된다 — 릴리스 버전으로 되돌리는 롤백 경로가 깨진다.
      # 그래서 배포는 v* 태그에서 실행된 경우로만 한정한다(태그 push 트리거는 이미 v*로 제한됨).
      - name: Validate release tag
        run: |
          if [[ "${{ github.ref_type }}" != "tag" || "${{ github.ref_name }}" != v* ]]; then
            echo "::error::배포는 v* 릴리스 태그에서만 실행할 수 있습니다. 현재 ref: ${{ github.ref_type }}/${{ github.ref_name }}"
            exit 1
          fi

      # 이 잡은 GITHUB_TOKEN을 git config에 남길 필요가 없다(bootJar가 서드파티 코드를 돌리므로 유출면 축소).
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 실행 jar만 만든다(테스트는 test.yml 담당). plain jar는 build.gradle에서 비활성화됨.
      - name: Build jar
        run: ./gradlew bootJar --no-daemon

      # GHCR 이미지 경로는 소문자만 허용 — 레포명(Li-routi/...)을 소문자로 변환한다.
      - name: Resolve lowercase image name
        id: img
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 크로스 빌드)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # t4g(Graviton)는 ARM이므로 반드시 linux/arm64로 빌드한다. amd64 이미지는 서버에서 실행 불가.
      # 롤백 경로를 위해 latest와 커밋 sha 태그를 함께 push한다.
      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ github.ref_name }}
            ${{ steps.img.outputs.image }}:${{ github.sha }}

      # 서버는 새 이미지를 pull 해서 재기동만 한다(서버에서 빌드하지 않음).
      # ssh-action은 v1.2.3에 고정한다. v1.2.4부터 번들 drone-ssh가 1.8.2로 올라가면서
      # 입력(host/key)을 못 읽고 "no configuration file provided"로 죽는 회귀가 있어,
      # 1.8.2 직전 버전인 v1.2.3으로 내려 우회한다.
      # 서드파티 액션이라 태그가 옮겨질 수 있어 v1.2.3 커밋 SHA로 고정한다.
      - name: Deploy over SSH
        uses: appleboy/ssh-action@91f3272fc5907f4699dcf59761eb622a07342f5a # v1.2.3
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/app
            # 이번에 push한 버전(예: v1.0.2)으로 고정한다. latest가 아니라 이 태그 이미지를 그대로 받는다.
            if grep -q '^APP_IMAGE_TAG=' .env; then
              sed -i "s/^APP_IMAGE_TAG=.*/APP_IMAGE_TAG=${IMAGE_TAG}/" .env
            else
              echo "APP_IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi
            docker compose pull
            docker compose up -d
            # 앱이 실제로 응답할 때까지 대기(최대 ~90s). 안 뜨면 배포 실패로 처리해 Discord 실패 알림이 나가게 한다.
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null http://localhost:8080/api/challenges; then
                echo "app is ready"; break
              fi
              if [ "$i" = "30" ]; then
                echo "app did not become ready — recent logs:"; docker compose logs --tail=50 app; exit 1
              fi
              sleep 3
            done
            docker image prune -f

      # 배포 결과를 Discord로 알림. DISCORD_WEBHOOK 시크릿이 없으면 조용히 건너뛴다.
      - name: Notify Discord (성공)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -sf -H "Content-Type: application/json" \
            -d "$(printf '{"content":"✅ **배포 성공** — `%s` — %s"}' "$REF" "$RUN_URL")" \
            "$DISCORD_WEBHOOK" || true

      - name: Notify Discord (실패)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -sf -H "Content-Type: application/json" \
            -d "$(printf '{"content":"❌ **배포 실패** — `%s` — %s"}' "$REF" "$RUN_URL")" \
            "$DISCORD_WEBHOOK" || true
