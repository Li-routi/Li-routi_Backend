name: Deploy to EC2

# develop에 머지될 때만 배포한다. (리뷰를 거쳐 develop에 들어온 코드 = 배포 대상)
# 테스트는 test.yml(모든 push)이 담당하고, 여기서는 이미지로 만들어 배포만 한다.
#
# 이미지 태그는 커밋 sha로 고정한다. :develop 같은 이동형 태그를 서버 .env에 박으면
# "정확히 그 버전으로 되돌리는" 롤백 기준이 사라지기 때문이다.
on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  # 1단계) 이미지 빌드·push — 실패하면 "빌드 실패"로 한눈에 구분된다.
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # workflow_dispatch는 아무 브랜치에서나 실행할 수 있다. 그대로 두면 피처 브랜치가
      # 운영에 배포되고 :develop 태그도 그 빌드를 가리키게 되므로, develop으로 제한한다.
      - name: Validate deploy ref
        run: |
          if [[ "${{ github.ref_name }}" != "develop" ]]; then
            echo "::error::배포는 develop에서만 실행할 수 있습니다. 현재 ref: ${{ github.ref_name }}"
            exit 1
          fi

      # 이 잡은 GITHUB_TOKEN을 git config에 남길 필요가 없다(bootJar가 서드파티 코드를 돌리므로 유출면 축소).
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 실행 jar만 만든다(테스트는 test.yml 담당). plain jar는 build.gradle에서 비활성화됨.
      - name: Build jar
        run: ./gradlew bootJar --no-daemon

      # GHCR 이미지 경로는 소문자만 허용 — 레포명(Li-routi/...)을 소문자로 변환한다.
      - name: Resolve lowercase image name
        id: img
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 크로스 빌드)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # t4g(Graviton)는 ARM이므로 반드시 linux/arm64로 빌드한다. amd64 이미지는 서버에서 실행 불가.
      # 서버가 실제로 받는 것은 :<커밋sha>다. :latest는 사람이 최신 배포본을 가리킬 때 쓰는 이동형 태그.
      # (배포가 develop에서만 도므로 :develop 태그는 :latest와 항상 같아 두지 않는다.)
      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ github.sha }}

  # 2단계) 배포 — 빌드 성공 시에만 실행. 서버는 이미지를 pull 해서 재기동만 한다.
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      # ssh-action은 v1.2.3에 고정한다. v1.2.4부터 번들 drone-ssh가 1.8.2로 올라가면서
      # 입력(host/key)을 못 읽고 "no configuration file provided"로 죽는 회귀가 있어,
      # 1.8.2 직전 버전인 v1.2.3으로 내려 우회한다.
      # 서드파티 액션이라 태그가 옮겨질 수 있어 v1.2.3 커밋 SHA로 고정한다.
      - name: Deploy over SSH
        uses: appleboy/ssh-action@91f3272fc5907f4699dcf59761eb622a07342f5a # v1.2.3
        env:
          IMAGE_TAG: ${{ github.sha }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG,ENV_FILE
          script: |
            set -e
            cd /opt/app
            # 런타임 설정은 GitHub Secret(ENV_FILE)이 단일 진실 공급원이다.
            # 매 배포마다 .env를 새로 쓰므로, 서버에서 직접 고친 값은 여기서 원복된다.
            # printf '%s'는 백슬래시를 해석하지 않아 값이 그대로 보존된다(echo는 변형 위험).
            if [ -z "$ENV_FILE" ]; then
              echo "::error::ENV_FILE 시크릿이 비어 있습니다. 정상 .env를 덮어쓰지 않도록 중단합니다."
              exit 1
            fi
            # 임시 파일에 완성한 뒤 mv로 교체한다. 곧바로 .env에 리다이렉트하면
            #  (1) 기존 파일의 권한이 그대로 남고(umask는 새로 만드는 파일에만 적용된다)
            #  (2) 쓰는 도중 실패하면 정상 .env가 반쯤 덮인 채 남는다.
            tmp="$(mktemp .env.XXXXXX)"
            chmod 600 "$tmp"
            printf '%s\n' "$ENV_FILE" > "$tmp"
            # 배포할 이미지는 커밋 sha로 고정한다(이동형 태그가 아니라 이 커밋 그대로).
            printf 'APP_IMAGE_TAG=%s\n' "$IMAGE_TAG" >> "$tmp"
            mv "$tmp" .env
            docker compose pull
            docker compose up -d
            # 앱이 실제로 응답할 때까지 대기(최대 ~90s). 안 뜨면 배포 실패로 처리해 실패 알림이 나가게 한다.
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null http://localhost:8080/api/challenges; then
                echo "app is ready"; break
              fi
              if [ "$i" = "30" ]; then
                echo "app did not become ready — recent logs:"; docker compose logs --tail=50 app; exit 1
              fi
              sleep 3
            done
            # 배포마다 새 :<커밋sha> 이미지가 쌓이는데, prune -f는 태그가 붙은 이미지를 지우지 않아
            # 디스크(30GB)가 계속 찬다. -a로 사용 중이 아닌 이미지까지 정리한다.
            # 실행 중인 컨테이너가 쓰는 이미지(app 현재 버전·db·redis)는 대상이 아니라 안전하고,
            # 옛 버전으로 롤백할 때는 GHCR에서 다시 pull된다.
            docker image prune -af

  # 3단계) 알림 — 빌드에서 죽든 배포에서 죽든 결과가 나가도록 always()로 돌린다.
  notify:
    name: Notify Discord
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # DISCORD_WEBHOOK 시크릿이 없으면 조용히 건너뛴다.
      - name: Notify result
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REF: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          if [ "$BUILD_RESULT" != "success" ]; then
            MSG="❌ **빌드 실패**"
          elif [ "$DEPLOY_RESULT" != "success" ]; then
            MSG="❌ **배포 실패** (빌드는 성공)"
          else
            MSG="✅ **배포 성공**"
          fi
          curl -sf -H "Content-Type: application/json" \
            -d "$(printf '{"content":"%s — `%s` — %s"}' "$MSG" "$REF" "$RUN_URL")" \
            "$DISCORD_WEBHOOK" || true
