name: Test

# 모든 브랜치의 push마다 테스트를 돌린다. develop만 제외하는데, develop은
# deploy.yml이 이 워크플로를 workflow_call로 호출해 배포 전에 돌리기 때문이다
# (제외하지 않으면 develop push마다 같은 커밋을 두 번 테스트한다).
#
# pull_request 트리거도 일부러 두지 않는다. 두면 PR이 열린 브랜치에 push할 때
# push·pull_request가 모두 발동해 같은 커밋을 두 번 테스트한다(조직 Actions 분은
# free 플랜 월 2,000분을 레포끼리 공유한다). 상태 체크는 커밋 sha 기준이라,
# push로 생성된 이 체크가 PR의 required status check를 그대로 만족시킨다.
on:
  push:
    branches-ignore: [develop]
  workflow_call:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    # @SpringBootTest가 붙을 MySQL·Redis를 CI 안에서 컨테이너로 기동(localhost 기본값으로 접속)
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root1234
          MYSQL_DATABASE: lirouti
          MYSQL_USER: lirouti
          MYSQL_PASSWORD: lirouti1234
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -proot1234"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # fail-fast 필수 값(JWT_SECRET 등)은 build.gradle의 test 태스크가 더미로 주입하므로 env 불필요.
      # DB/Redis는 application.yaml 기본값(localhost:3306 / 6379)이 위 서비스 컨테이너에 붙는다.
      - name: Build & test
        run: ./gradlew build --no-daemon

      # 테스트 실패 시에만 Discord로 알림. DISCORD_WEBHOOK 시크릿이 없으면 조용히 건너뛴다.
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -sf -H "Content-Type: application/json" \
            -d "$(printf '{"content":"❌ **테스트 실패** — `%s` by %s — %s"}' "$REF" "$ACTOR" "$RUN_URL")" \
            "$DISCORD_WEBHOOK" || true
